# AuthFlaw AI Configuration

burp:
  host: "127.0.0.1"
  port: 8080
  use_proxy: true

ai:
  model: "llama3.2"
  fallback_enabled: true
  timeout: 30

testing:
  max_variants: 20
  request_timeout: 10
  delay_between_requests: 0.5

modules:
  enabled:
    - SQLi
    - MassAssignment
    - RegistrationPrivEsc
    - JWT_None
    - JWT_Confusion
    - HostHeader
  
reporting:
  output_format: "json"
  save_to_file: true
  output_directory: "reports"
